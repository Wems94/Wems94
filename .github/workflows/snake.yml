name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Wems94
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Generate animated Core Stack SVG
        run: |
          pip install requests -q
          python3 - <<'EOF'
          import requests, base64, re, os

          icons = "py,gcp,postgres,docker,git,github,linux,vscode,bash,azure"
          r = requests.get(f"https://skillicons.dev/icons?i={icons}", timeout=30)
          svg = r.text

          W = round(float(re.search(r'<svg[^>]+width="([^"]+)"', svg).group(1)))
          H = round(float(re.search(r'<svg[^>]+height="([^"]+)"', svg).group(1)))
          b64 = base64.b64encode(svg.encode()).decode()

          out = f"""<svg width="{W}" height="{H}" viewBox="0 0 {W} {H}" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <style>
                .m {{ animation: s 22s linear infinite; }}
                @keyframes s {{ 0% {{ transform: translateX(0); }} 100% {{ transform: translateX(-{W}px); }} }}
              </style>
              <clipPath id="c"><rect width="{W}" height="{H}"/></clipPath>
              <linearGradient id="fl" x1="0%" x2="100%"><stop offset="0%" stop-color="#040810"/><stop offset="12%" stop-color="#040810" stop-opacity="0"/></linearGradient>
              <linearGradient id="fr" x1="0%" x2="100%"><stop offset="88%" stop-color="#040810" stop-opacity="0"/><stop offset="100%" stop-color="#040810"/></linearGradient>
            </defs>
            <g clip-path="url(#c)" class="m">
              <image href="data:image/svg+xml;base64,{b64}" width="{W}" height="{H}"/>
              <image href="data:image/svg+xml;base64,{b64}" x="{W}" width="{W}" height="{H}"/>
            </g>
            <rect width="{W}" height="{H}" fill="url(#fl)"/>
            <rect width="{W}" height="{H}" fill="url(#fr)"/>
          </svg>"""

          os.makedirs("dist", exist_ok=True)
          with open("dist/core-stack-animated.svg", "w") as f:
              f.write(out)
          print(f"Generated: {W}x{H}px")
          EOF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
